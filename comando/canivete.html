<!doctype html><html lang="pt-br"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0A0C10"><title>KRONOS · Canivete</title>
<link rel="manifest" href="manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
:root{--bg:#0A0C10;--surf:#121620;--surf2:#171C28;--line:#28303F;--on:#E6EAF2;--mut:#9AA6B8;--faint:#67738A;--gold:#E0A93E;--green:#4BD6A0;--red:#FF5D6C;--blue:#67B0FF}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--on);font-family:Roboto,system-ui,sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;height:100dvh}
.material-symbols-rounded{font-variation-settings:"FILL" 0,"wght" 400}
.top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:#0A0C10}
.logo{width:32px;height:32px;border-radius:9px;border:1px solid #3a3214;background:radial-gradient(120% 120% at 30% 20%,#2a2410,#0A0C10);display:grid;place-items:center}
.logo svg{width:22px;height:22px}
.tt{font-size:15px;font-weight:800;letter-spacing:.5px}
.ver{font-size:10px;color:var(--gold);letter-spacing:1px;font-weight:700}
.st{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut)}
.dot{width:8px;height:8px;border-radius:9px;background:var(--green);box-shadow:0 0 0 4px rgba(75,214,160,.12)}
.dot.off{background:var(--red);box-shadow:0 0 0 4px rgba(255,93,108,.12)}
#feed{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
.me{align-self:flex-end;background:var(--gold);color:#1A1300;border-bottom-right-radius:5px}
.kr{align-self:flex-start;background:var(--surf2);border:1px solid var(--line);border-bottom-left-radius:5px}
.msg img,.msg video{max-width:100%;border-radius:12px;display:block;margin-top:4px}
.filec{display:flex;align-items:center;gap:9px;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-top:4px}
.filec .material-symbols-rounded{color:var(--gold)}
.hint{align-self:center;color:var(--faint);font-size:11.5px;text-align:center;max-width:90%}
.bar{display:flex;align-items:flex-end;gap:7px;padding:9px 10px calc(9px + env(safe-area-inset-bottom,0));border-top:1px solid var(--line);background:#0A0C10}
.ib{width:44px;height:44px;flex:none;border-radius:14px;background:var(--surf2);border:1px solid var(--line);display:grid;place-items:center;color:var(--on)}
.ib:active{transform:scale(.93)}.ib .material-symbols-rounded{font-size:23px}
.ib.rec{background:var(--red);color:#fff;animation:p .8s infinite}@keyframes p{50%{opacity:.5}}
#txt{flex:1;min-height:44px;max-height:120px;background:var(--surf2);border:1px solid var(--line);color:var(--on);border-radius:14px;padding:11px 13px;font-family:inherit;font-size:14px;resize:none}
.snd{background:var(--gold);color:#1A1300;border:none}
.cam{position:fixed;inset:0;z-index:80;background:#000;display:none;flex-direction:column}
.cam.on{display:flex}.cam video{flex:1;width:100%;object-fit:cover}
.cam .cbar{display:flex;justify-content:center;align-items:center;gap:30px;padding:20px calc(20px + env(safe-area-inset-bottom,0))}
.cbtn{width:68px;height:68px;border-radius:99px;background:#fff;border:4px solid var(--gold)}
.cx{position:absolute;top:14px;right:14px;width:44px;height:44px;border-radius:99px;background:rgba(0,0,0,.5);color:#fff;display:grid;place-items:center}
</style></head><body>
<div class="top"><div class="logo"><svg viewBox="0 0 200 200"><circle cx="100" cy="100" r="74" fill="none" stroke="#E0A93E" stroke-width="3" opacity=".55"/><path d="M78 56 v88 M78 100 L124 56 M84 95 L126 144" stroke="#E0A93E" stroke-width="9" fill="none" stroke-linecap="round"/></svg></div>
<div><div class="tt">KRONOS</div><div class="ver">CANIVETE v1.1</div></div>
<div class="st"><span class="dot" id="dot"></span><span id="stx">conectando</span></div></div>
<div id="feed"></div>
<div class="bar">
<button class="ib" id="bcam" title="camera"><span class="material-symbols-rounded">photo_camera</span></button>
<button class="ib" id="bup" title="arquivo"><span class="material-symbols-rounded">attach_file</span></button>
<textarea id="txt" rows="1" placeholder="Fale, escreva ou mostre algo..."></textarea>
<button class="ib" id="bmic" title="microfone"><span class="material-symbols-rounded">mic</span></button>
<button class="ib snd" id="bsnd"><span class="material-symbols-rounded">arrow_upward</span></button>
</div>
<input type="file" id="file" style="display:none">
<div class="cam" id="cam"><button class="cx" id="cx"><span class="material-symbols-rounded">close</span></button><video id="cv" autoplay playsinline muted></video><div class="cbar"><button class="cbtn" id="cshot"></button></div></div>
<script>
var KEY=new URLSearchParams(location.search).get("k")||"kx7m2-aprov";
var GW="https://qxfyduqmuemdttrijukg.supabase.co/functions/v1/cockpit";
var VOZ="https://qxfyduqmuemdttrijukg.supabase.co/functions/v1/cockpit_voz";
var BRAIN="https://qxfyduqmuemdttrijukg.supabase.co/functions/v1/cockpit_cerebro";
var feed=document.getElementById("feed");
function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]);});}
function add(role,inner){var d=document.createElement("div");d.className="msg "+(role==="me"?"me":"kr");d.innerHTML=inner;feed.appendChild(d);feed.scrollTop=feed.scrollHeight;return d;}
function hint(t){var d=document.createElement("div");d.className="hint";d.textContent=t;feed.appendChild(d);feed.scrollTop=feed.scrollHeight;}
function setDot(ok){document.getElementById("dot").className="dot"+(ok?"":" off");document.getElementById("stx").textContent=ok?"ao vivo":"reconectando";}
function api(qs,o){return fetch(GW+"?"+qs+"&k="+encodeURIComponent(KEY),o);}
var STATE=null;
function pull(){api("data=2").then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(j){STATE=j;setDot(true);}).catch(function(){setDot(false);});}
function resumo(){if(!STATE)return "Ainda carregando o estado do sistema.";var p=STATE.progresso||{};var pend=(STATE.intencoes||[]).filter(function(i){return i.status==="pendente";}).length;return "Estado agora: "+(p.tarefas_concluidas||0)+" tarefas feitas, "+pend+" pendencias, "+(p.agentes_ativos||0)+" agentes ativos, "+(p.falhas_abertas||0)+" falhas abertas, cobertura "+(p.cobertura_media||0)+"%.";}
function listaPend(){if(!STATE)return "Carregando...";var it=(STATE.intencoes||[]).filter(function(i){return i.status==="pendente";}).slice(0,8);if(!it.length)return "Sem pendencias. Tudo limpo.";return "Pendencias:\n"+it.map(function(i){return "- "+i.intencao;}).join("\n");}
function localAnswer(t){var q=t.toLowerCase();if(/pend[eê]nc/.test(q))return listaPend();if(/indicador|estado atual|status do sistema|resumo do sistema/.test(q))return resumo();if(/falha/.test(q)){var f=(STATE&&STATE.falhas||[]).filter(function(x){return x.status==="aberta";});return f.length?("Falhas abertas:\n"+f.map(function(x){return "- "+x.falha;}).join("\n")):"Sem falhas abertas.";}if(/agentes/.test(q)){var a=(STATE&&STATE.agentes||[]);return a.length?("Agentes:\n"+a.map(function(x){return "- "+x.nome+(x.ativo?" (ativo)":"");}).join("\n")):"Sem agentes.";}return null;}
function sendToBrain(texto,imgB64,mime){var la=(!imgB64)?localAnswer(texto):null;if(la){add("kr",esc(la));return Promise.resolve();}var loading=add("kr","<i>pensando...</i>");return fetch(BRAIN+"?k="+encodeURIComponent(KEY),{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({texto:texto,imagem_b64:imgB64||"",mime:mime||""})}).then(function(r){return r.json();}).then(function(j){loading.innerHTML=esc(j.resposta||j.erro||"(sem resposta)");feed.scrollTop=feed.scrollHeight;}).catch(function(e){loading.innerHTML=esc("Falha ao falar com a IA: "+(e.message||e));});}
function send(){var t=document.getElementById("txt");var v=t.value.trim();if(!v)return;add("me",esc(v));t.value="";t.style.height="44px";sendToBrain(v);}
document.getElementById("bsnd").onclick=send;
var txta=document.getElementById("txt");txta.addEventListener("input",function(){this.style.height="44px";this.style.height=Math.min(120,this.scrollHeight)+"px";});
txta.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById("bup").onclick=function(){document.getElementById("file").click();};
document.getElementById("file").onchange=function(){var f=this.files&&this.files[0];if(!f)return;var url=URL.createObjectURL(f);if(/^image\//.test(f.type)){add("me",esc(f.name)+"<img src=\""+url+"\">");var rd=new FileReader();rd.onload=function(){var b64=String(rd.result).split(",")[1];sendToBrain("(imagem enviada por arquivo: "+f.name+") analise e descreva o que voce ve.",b64,f.type);};rd.readAsDataURL(f);}else if(/^video\//.test(f.type)){add("me","<video src=\""+url+"\" controls></video>");hint("Video recebido.");}else{add("me","<div class=\"filec\"><span class=\"material-symbols-rounded\">description</span>"+esc(f.name)+"</div>");hint("Arquivo recebido. (Leitura de PDF/Word entra na proxima etapa.)");}this.value="";};
var mr=null,chunks=[],recMsg=null,recTimer=null;
function stopMic(){if(mr&&mr.state==="recording")mr.stop();}
document.getElementById("bmic").onclick=function(){var b=this;if(mr&&mr.state==="recording"){stopMic();return;}navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){var mime=MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":(MediaRecorder.isTypeSupported("audio/mp4")?"audio/mp4":"");mr=new MediaRecorder(s,mime?{mimeType:mime}:undefined);chunks=[];mr.ondataavailable=function(e){if(e.data&&e.data.size)chunks.push(e.data);};mr.onstart=function(){b.classList.add("rec");recMsg=add("kr","Gravando... toque no microfone de novo para enviar.");};mr.onstop=function(){b.classList.remove("rec");clearTimeout(recTimer);s.getTracks().forEach(function(t){t.stop();});var blob=new Blob(chunks,{type:mime||"audio/webm"});if(recMsg)recMsg.innerHTML="<i>transcrevendo seu audio...</i>";blob.arrayBuffer().then(function(buf){var u=new Uint8Array(buf),x="";for(var i=0;i<u.length;i++)x+=String.fromCharCode(u[i]);var b64=btoa(x);return fetch(VOZ+"?transcrever=1&k="+encodeURIComponent(KEY),{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({b64:b64,mime:mime})});}).then(function(r){return r.json();}).then(function(j){var tx=((j&&j.texto)||"").trim();if(recMsg&&recMsg.parentNode){recMsg.parentNode.removeChild(recMsg);}recMsg=null;if(tx){add("me",esc(tx));sendToBrain(tx);}else{hint("Nao consegui entender o audio. Fale mais perto e tente de novo.");}}).catch(function(e){if(recMsg)recMsg.innerHTML="(falha ao transcrever)";hint("Falha na transcricao: "+(e.message||e));});};mr.start();recTimer=setTimeout(function(){stopMic();},60000);}).catch(function(e){hint("Microfone bloqueado ou indisponivel. Permita o microfone para este site nas configuracoes do navegador. ("+(e.name||e)+")");});};
var camEl=document.getElementById("cam"),cv=document.getElementById("cv"),cstream=null;
document.getElementById("bcam").onclick=function(){navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false}).then(function(s){cstream=s;cv.srcObject=s;camEl.classList.add("on");}).catch(function(){hint("Camera bloqueada pelo navegador.");});};
function closeCam(){if(cstream){cstream.getTracks().forEach(function(t){t.stop();});cstream=null;}camEl.classList.remove("on");}
document.getElementById("cx").onclick=closeCam;
document.getElementById("cshot").onclick=function(){var c=document.createElement("canvas");c.width=cv.videoWidth;c.height=cv.videoHeight;c.getContext("2d").drawImage(cv,0,0);var data=c.toDataURL("image/jpeg",0.85);closeCam();add("me","<img src=\""+data+"\">");var b64=data.split(",")[1];sendToBrain("(foto da camera) o que voce ve nesta imagem?",b64,"image/jpeg");};
add("kr","Ola, Renato. Sou o KRONOS na sua tela unica, agora ligado a IA. Pergunte qualquer coisa, mande uma foto (camera ou arquivo) que eu enxergo e analiso, ou fale no microfone. Tambem respondo sobre <b>pendencias, indicadores, falhas e agentes</b> com dados reais do seu sistema.");
pull();setInterval(pull,30000);
</script></body></html>
