function bb64(u){let s='';for(let i=0;i<u.length;i++)s+=String.fromCharCode(u[i]);return btoa(s);}
async function consultar(area){try{const r=await fetch(GW2+'?data=2&k='+encodeURIComponent(K));const s=await r.json();if(area==='estado')return{progresso:s.progresso,tempo_real:s.tempo_real};if(area==='pendencias')return{intencoes:(s.intencoes||[]).slice(0,15),tarefas:(s.tarefas||[]).filter(t=>t.status!=='feito'&&t.status!=='concluida').slice(0,15)};if(area==='decisoes')return{decisoes:(s.decisoes||[]).filter(d=>d.status==='ativa').slice(0,12)};if(area==='falhas')return{falhas:(s.falhas||[]).filter(f=>f.status==='aberta')};if(area==='agentes')return{agentes:s.agentes};if(area==='cobertura')return{cobertura:s.cobertura};return{progresso:s.progresso};}catch(e){return{erro:String(e)};}}
function playPcm(b64,mime){if(!outCtx)return;if(outCtx.state==='suspended'){try{outCtx.resume();}catch(e){}}let rate=24000;if(mime){const m=/rate=(\d+)/.exec(mime);if(m)rate=parseInt(m[1],10);}const u=b64b(b64);const i16=new Int16Array(u.buffer);const f=new Float32Array(i16.length);for(let i=0;i<i16.length;i++)f[i]=i16[i]/32768;const buf=outCtx.createBuffer(1,f.length,rate);buf.getChannelData(0).set(f);const s=outCtx.createBufferSource();s.buffer=buf;s.connect(outCtx.destination);const start=Math.max(outCtx.currentTime,nextT);s.start(start);nextT=start+buf.duration;srcs.push(s);vstat('KRONOS falando...');}
function stopPlay(){srcs.forEach(s=>{try{s.stop();}catch(e){}});srcs=[];nextT=0;}
async function startVoice(){document.getElementById('voz-panel').style.display='block';vstat('conectando...');let token,model;try{const tr=await fetch(VOZ_FN+'?token=1&k='+encodeURIComponent(K)+'&n='+Date.now());const tj=await tr.json();if(!tj.ok||!tj.name)throw new Error(tj.erro||'sem token');token=tj.name;model=tj.model;}catch(e){vstat('falha no token: '+(e.message||e));return;}try{outCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:24000});await outCtx.resume();}catch(e){}nextT=0;srcs=[];gotAudio=false;const tools=[{functionDeclarations:[{name:'consultar_banco',description:'Consulta o banco da verdade do KRONOS e retorna dados reais. Use SEMPRE antes de afirmar qualquer fato sobre o sistema.',parameters:{type:'OBJECT',properties:{area:{type:'STRING',description:'um de: estado, pendencias, decisoes, falhas, agentes, cobertura'}},required:['area']}}]}];const sys='Voce e o KRONOS, sistema de orquestracao soberano, conversando por voz em portugues do Brasil com Renato. Seja conciso, direto, respeitoso e pratico. REGRA ABSOLUTA: nunca invente dados; antes de afirmar qualquer fato sobre o sistema, chame a ferramenta consultar_banco e responda apenas com o que ela retornar. Voce LE e PROPOE; nunca executa acao irreversivel (dinheiro, contrato, publicar) - para isso, oriente Renato a usar o toque no painel.';try{const ai=new GoogleGenAI({apiKey:token,httpOptions:{apiVersion:'v1alpha'}});vsession=await ai.live.connect({model,config:{responseModalities:[Modality.AUDIO],systemInstruction:sys,tools,inputAudioTranscription:{},outputAudioTranscription:{}},callbacks:{onopen:()=>{vstat('Ouvindo... pode falar');vlog('conectado');},onmessage:async msg=>{try{const mt=msg.serverContent&&msg.serverContent.modelTurn;if(mt&&mt.parts)for(const p of mt.parts){if(p.inlineData&&p.inlineData.data){gotAudio=true;playPcm(p.inlineData.data,p.inlineData.mimeType);}}if(msg.serverContent&&msg.serverContent.interrupted){stopPlay();vstat('Ouvindo...');}if(msg.serverContent&&msg.serverContent.inputTranscription&&msg.serverContent.inputTranscription.text)vlog('voce: '+msg.serverContent.inputTranscription.text);if(msg.serverContent&&msg.serverContent.outputTranscription&&msg.serverContent.outputTranscription.text)vlog('KRONOS: '+msg.serverContent.outputTranscription.text);if(msg.toolCall&&msg.toolCall.functionCalls){const rs=[];for(const fc of msg.toolCall.functionCalls){const a=(fc.args&&fc.args.area)||'estado';const res=await consultar(a);rs.push({id:fc.id,name:fc.name,response:{result:res}});}vsession.sendToolResponse({functionResponses:rs});}if(msg.serverContent&&msg.serverContent.turnComplete){if(srcs.length===0)vstat('Ouvindo...');}}catch(e){vlog('erro msg: '+(e.message||e));}},onerror:e=>{vstat('erro: '+(e&&(e.message||e)));},onclose:()=>{vlog('encerrado');}}});}catch(e){vstat('falha ao conectar: '+(e.message||e));return;}try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});inCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});const src=inCtx.createMediaStreamSource(micStream);proc=inCtx.createScriptProcessor(4096,1,1);src.connect(proc);proc.connect(inCtx.destination);proc.onaudioprocess=ev=>{if(!talking)return;const f=ev.inputBuffer.getChannelData(0);const pcm=new Int16Array(f.length);for(let i=0;i<f.length;i++){let x=Math.max(-1,Math.min(1,f[i]));pcm[i]=x<0?x*0x8000:x*0x7FFF;}try{vsession.sendRealtimeInput({audio:{data:bb64(new Uint8Array(pcm.buffer)),mimeType:'audio/pcm;rate=16000'}});}catch(e){}};talking=true;document.getElementById('voz-btn').classList.add('rec');}catch(e){vstat('microfone bloqueado: '+(e.message||e));}}
function stopVoice(){talking=false;try{proc&&proc.disconnect();}catch(e){}try{micStream&&micStream.getTracks().forEach(t=>t.stop());}catch(e){}try{vsession&&vsession.close();}catch(e){}stopPlay();const b=document.getElementById('voz-btn');if(b)b.classList.remove('rec');vstat('Chamada encerrada. Toque no telefone para ligar de novo.');setTimeout(function(){var pp=document.getElementById('voz-panel');if(pp&&!talking)pp.style.display='none';},4000);}
const vb=document.getElementById('voz-btn');if(vb)vb.addEventListener('click',()=>{talking?stopVoice():startVoice();});
var bm=document.getElementById('voz-mute');if(bm)bm.onclick=function(){if(!micStream){vstat('Ligue primeiro.');return;}var tr=micStream.getAudioTracks()[0];if(tr){tr.enabled=!tr.enabled;bm.textContent=tr.enabled?'Mudo':'Reativar mic';vstat(tr.enabled?'Ouvindo...':'Microfone MUDO');}};
var bh=document.getElementById('voz-hangup');if(bh)bh.onclick=function(){stopVoice();};
</script>
</body></html>
