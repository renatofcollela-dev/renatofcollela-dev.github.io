<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#faf9f5">
<title>KRONOS · v12</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#faf9f5;--surf:#fff;--line:#e7e4d8;--on:#141413;--mut:#6f6e66;--faint:#a8a69c;--primary:#cc6f4e;--user:#ece8df;--green:#5f7a43;--red:#b3322c}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--on);font-family:Inter,system-ui,sans-serif}
body{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;flex:none}
header .b{font-weight:700;font-size:13px;letter-spacing:1.5px;color:var(--mut)}
header .s{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--faint)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.dot.rec{background:var(--red);animation:p 1s infinite} .dot.on{background:var(--green)}
@keyframes p{50%{opacity:.4}}
#thread{flex:1;overflow-y:auto;padding:8px 16px 20px;display:flex;flex-direction:column;gap:16px;width:100%;max-width:760px;margin:0 auto}
.msg .nm{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:3px;letter-spacing:.3px}
.msg .tx{font-size:15px;line-height:1.6;white-space:pre-wrap}
.msg.u{align-self:flex-end;max-width:82%;background:var(--user);border-radius:16px;padding:9px 13px}
.msg.u .tx{font-size:14px}
.blk{border:0.5px solid var(--line);border-radius:14px;background:var(--surf);overflow:hidden}
.blk .h{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;padding:11px 13px 2px}
.blk .bd{padding:6px 13px 12px}
.rw{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--line);font-size:13.5px}
.rw:last-child{border-bottom:none}
.rw .v{font-weight:600;color:var(--mut);text-align:right;flex:none}
.blk img{width:100%;display:block}
.cap{font-size:11px;color:var(--faint);padding:8px 13px}
.empty{margin:auto;text-align:center;color:var(--faint);font-size:14px;max-width:78%;line-height:1.6}
footer{flex:none;padding:8px 14px calc(10px + env(safe-area-inset-bottom,0px));border-top:0.5px solid var(--line);background:var(--bg)}
.bar{display:flex;align-items:center;gap:6px;background:var(--surf);border:0.5px solid var(--line);border-radius:24px;padding:5px 6px 5px 15px;max-width:760px;margin:0 auto}
.bar input{flex:1;border:none;background:none;outline:none;font:inherit;font-size:14px;color:var(--on)}
.bar input::placeholder{color:var(--faint)}
.ic{width:40px;height:40px;border-radius:50%;border:none;background:none;color:var(--mut);display:grid;place-items:center;flex:none}
.mic{width:42px;height:42px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;flex:none;border:none;touch-action:none;user-select:none}
.mic.on{background:var(--red);box-shadow:0 0 0 4px rgba(179,50,44,.16)}
.mic .material-symbols-rounded{font-size:22px}
.hint{text-align:center;font-size:10.5px;color:var(--faint);margin-top:6px}
</style>
</head>
<body>
<header>
  <span class="b">KRONOS</span>
  <span class="s"><span class="dot" id="dot"></span><span id="stat">toque o microfone ou escreva</span></span>
</header>
<div id="thread"><div class="empty" id="empty">Fale ou escreva. Peça um indicador, as pendências ou uma imagem — o KRONOS mostra aqui na tela.</div></div>
<footer>
  <div class="bar">
    <input id="txt" placeholder="Pergunte ao KRONOS…" autocomplete="off">
    <button class="ic" id="mute" title="mudo" style="display:none"><span class="material-symbols-rounded">mic_off</span></button>
    <button class="mic" id="mic" aria-label="microfone"><span class="material-symbols-rounded">mic</span></button>
  </div>
  <div class="hint">toque = conversa contínua · segure = walkie-talkie · digite e Enter</div>
</footer>
<script type="module">
import { GoogleGenAI, Modality } from 'https://esm.sh/@google/genai@1.21.0';
const K=new URLSearchParams(location.search).get('k')||'kx7m2-aprov';
const GW='https://qxfyduqmuemdttrijukg.supabase.co/functions/v1/cockpit';
const VOZ='https://qxfyduqmuemdttrijukg.supabase.co/functions/v1/cockpit_voz';
const $=s=>document.querySelector(s);
const thread=$('#thread');
let ai=null,sess=null,inCtx=null,outCtx=null,proc=null,mic=null,sending=false,continuous=false,connected=false,connecting=false,nextT=0,srcs=[],botEl=null,userEl=null;
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function setStat(t,cls){$('#stat').textContent=t;if(cls!==undefined)$('#dot').className='dot '+cls;}
function scroll(){thread.scrollTop=thread.scrollHeight;}
function clearEmpty(){const e=$('#empty');if(e)e.remove();}
function addUser(t){clearEmpty();const d=document.createElement('div');d.className='msg u';d.innerHTML='<div class="tx"></div>';d.querySelector('.tx').textContent=t;thread.appendChild(d);scroll();return d;}
function newBot(){clearEmpty();const d=document.createElement('div');d.className='msg b';d.innerHTML='<div class="nm">KRONOS</div><div class="tx"></div>';thread.appendChild(d);scroll();return d;}
function addCards(title,rows){clearEmpty();const d=document.createElement('div');d.className='blk';let h='<div class="h">'+esc(title)+'</div><div class="bd">';rows.forEach(r=>{h+='<div class="rw"><span>'+esc(r[0])+'</span><span class="v">'+esc(r[1])+'</span></div>';});h+='</div>';d.innerHTML=h;thread.appendChild(d);scroll();}
function addImage(url,cap){clearEmpty();const d=document.createElement('div');d.className='blk';d.innerHTML='<img src="'+esc(url)+'" alt="">'+(cap?'<div class="cap">'+esc(cap)+'</div>':'');thread.appendChild(d);scroll();}
function addChart(title,labels,data){clearEmpty();const d=document.createElement('div');d.className='blk';d.innerHTML='<div class="h">'+esc(title)+'</div><div class="bd"><canvas height="160"></canvas></div>';thread.appendChild(d);try{new Chart(d.querySelector('canvas'),{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:'#cc6f4e',borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{display:false}}}}});}catch(e){}scroll();}
async function getState(){const r=await fetch(GW+'?data=2&k='+encodeURIComponent(K));return await r.json();}
async function tool(name,args){
  if(name==='buscar_imagem'){try{const q=(args.consulta||'').trim();const r=await fetch('https://pt.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(q));const j=await r.json();const url=(j.originalimage&&j.originalimage.source)||(j.thumbnail&&j.thumbnail.source);if(url){addImage(url,j.title||q);return{ok:true,titulo:j.title,resumo:(j.extract||'').slice(0,180)};}return{ok:false,erro:'sem imagem'};}catch(e){return{ok:false,erro:String(e)};}}
  try{
    const s=await getState();
    if(name==='mostrar_cartoes'){const a=(args.area||'estado');
      if(a==='estado'){const p=s.progresso||{};addCards('Estado',[['Cobertura média',(p.cobertura_media||0)+'%'],['Tarefas concluídas',(p.tarefas_concluidas||0)],['Tarefas abertas',(p.tarefas_abertas||0)],['Falhas abertas',(p.falhas_abertas||0)],['Aprovações pendentes',(p.aprov_pendentes||0)],['Agentes ativos',(p.agentes_ativos||0)]]);return{ok:true,estado:p};}
      if(a==='pendencias'){const it=(s.intencoes||[]).filter(i=>i.status==='pendente').slice(0,8);addCards('Pendências',it.map(i=>[String(i.intencao).slice(0,38),i.urgencia||'']));return{ok:true,total:it.length};}
      if(a==='decisoes'){const dd=(s.decisoes||[]).filter(d=>d.status==='ativa').slice(0,8);addCards('Decisões ativas',dd.map(d=>[d.codigo||'',String(d.decisao||'').slice(0,34)]));return{ok:true,total:dd.length};}
      if(a==='falhas'){const ff=(s.falhas||[]).filter(f=>f.status==='aberta');addCards('Falhas abertas',ff.map(f=>[String(f.falha||'').slice(0,40),f.severidade||'']));return{ok:true,total:ff.length};}
      if(a==='agentes'){const ag=s.agentes||[];addCards('Agentes',ag.map(x=>[x.nome,x.ultimo_status||'']));return{ok:true,total:ag.length};}
      if(a==='cobertura'){const c=s.cobertura||[];addCards('Cobertura por área',c.map(x=>[x.area,x.pct+'%']));return{ok:true};}
      return{ok:false,erro:'area desconhecida'};
    }
    if(name==='gerar_grafico'){const a=(args.area||'cobertura');
      if(a==='cobertura'){const c=s.cobertura||[];addChart('Cobertura por área (%)',c.map(x=>x.area),c.map(x=>x.pct));return{ok:true};}
      if(a==='falhas'){const p=s.progresso||{};addChart('Falhas',['Abertas','Corrigidas'],[p.falhas_abertas||0,p.falhas_corrigidas||0]);return{ok:true};}
      if(a==='tarefas'){const p=s.progresso||{};addChart('Tarefas',['Concluídas','Abertas'],[p.tarefas_concluidas||0,p.tarefas_abertas||0]);return{ok:true};}
      return{ok:false,erro:'area desconhecida'};
    }
  }catch(e){return{ok:false,erro:String(e)};}
  return{ok:false,erro:'tool desconhecida'};
}
function b64b(b){const s=atob(b);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
function bb64(u){let s='';for(let i=0;i<u.length;i++)s+=String.fromCharCode(u[i]);return btoa(s);}
function playPcm(b64,mime){if(!outCtx)return;if(outCtx.state==='suspended'){try{outCtx.resume();}catch(e){}}let rate=24000;if(mime){const m=/rate=(\d+)/.exec(mime);if(m)rate=parseInt(m[1],10);}const u=b64b(b64);const i16=new Int16Array(u.buffer);const f=new Float32Array(i16.length);for(let i=0;i<i16.length;i++)f[i]=i16[i]/32768;const buf=outCtx.createBuffer(1,f.length,rate);buf.getChannelData(0).set(f);const sc=outCtx.createBufferSource();sc.buffer=buf;sc.connect(outCtx.destination);const st=Math.max(outCtx.currentTime,nextT);sc.start(st);nextT=st+buf.duration;srcs.push(sc);}
function stopPlay(){srcs.forEach(s=>{try{s.stop();}catch(e){}});srcs=[];nextT=0;}
async function onMsg(m){
  const sc=m.serverContent;
  if(sc){
    if(sc.inputTranscription&&sc.inputTranscription.text){if(!userEl)userEl=addUser('');userEl.querySelector('.tx').textContent+=sc.inputTranscription.text;scroll();}
    if(sc.modelTurn&&sc.modelTurn.parts){for(const p of sc.modelTurn.parts){if(p.inlineData&&p.inlineData.data)playPcm(p.inlineData.data,p.inlineData.mimeType);}}
    if(sc.outputTranscription&&sc.outputTranscription.text){if(!botEl)botEl=newBot();botEl.querySelector('.tx').textContent+=sc.outputTranscription.text;scroll();}
    if(sc.interrupted)stopPlay();
    if(sc.turnComplete){botEl=null;userEl=null;}
  }
  if(m.toolCall&&m.toolCall.functionCalls){const rs=[];for(const fc of m.toolCall.functionCalls){const res=await tool(fc.name,fc.args||{});rs.push({id:fc.id,name:fc.name,response:{result:res}});}try{sess.sendToolResponse({functionResponses:rs});}catch(e){}}
}
async function connect(){
  if(connected||connecting)return false;connecting=true;setStat('conectando…');
  let token,model;
  try{const tr=await fetch(VOZ+'?token=1&k='+encodeURIComponent(K)+'&n='+Date.now());const tj=await tr.json();if(!tj.ok)throw new Error(tj.erro||'token');token=tj.name;model=tj.model;}catch(e){setStat('falha no token');connecting=false;return false;}
  try{outCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:24000});await outCtx.resume();}catch(e){}
  const tools=[{functionDeclarations:[
    {name:'mostrar_cartoes',description:'Mostra dados reais do banco como cartoes na tela. Use quando Renato pedir para VER estado, pendencias, decisoes, falhas, agentes ou cobertura.',parameters:{type:'OBJECT',properties:{area:{type:'STRING',description:'estado|pendencias|decisoes|falhas|agentes|cobertura'}},required:['area']}},
    {name:'gerar_grafico',description:'Desenha um grafico dos dados reais na tela. Use quando Renato pedir um grafico ou indicador visual.',parameters:{type:'OBJECT',properties:{area:{type:'STRING',description:'cobertura|falhas|tarefas'}},required:['area']}},
    {name:'buscar_imagem',description:'Busca uma imagem na web (Wikipedia) e mostra na tela. Use quando Renato pedir para VER uma imagem de algo.',parameters:{type:'OBJECT',properties:{consulta:{type:'STRING',description:'o que buscar'}},required:['consulta']}}
  ]}];
  const sys='Voce e o KRONOS, sistema soberano, falando portugues do Brasil com Renato numa unica tela conversacional. Seja conciso e direto. NUNCA invente: para qualquer fato do sistema, chame mostrar_cartoes ou gerar_grafico (dados reais do banco) antes de afirmar. Quando Renato pedir para VER algo (indicador, grafico, pendencias, imagem), CHAME a ferramenta certa para renderizar na tela e narre curto. Voce LE e PROPOE; nunca executa acao irreversivel (aprovar, publicar, dinheiro) — oriente o rito.';
  try{
    ai=new GoogleGenAI({apiKey:token,httpOptions:{apiVersion:'v1alpha'}});
    sess=await ai.live.connect({model:model,config:{responseModalities:[Modality.AUDIO],systemInstruction:sys,tools:tools,inputAudioTranscription:{},outputAudioTranscription:{}},callbacks:{
      onopen:()=>{connected=true;connecting=false;setStat('pronto','on');},
      onmessage:async m=>{try{await onMsg(m);}catch(e){}},
      onerror:e=>{setStat('erro de conexão');},
      onclose:()=>{connected=false;setStat('desconectado');}
    }});
  }catch(e){setStat('falha ao conectar');connecting=false;return false;}
  try{mic=await navigator.mediaDevices.getUserMedia({audio:true});inCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});const src=inCtx.createMediaStreamSource(mic);proc=inCtx.createScriptProcessor(4096,1,1);src.connect(proc);proc.connect(inCtx.destination);proc.onaudioprocess=ev=>{if(!sending||!sess)return;const f=ev.inputBuffer.getChannelData(0);const pcm=new Int16Array(f.length);for(let i=0;i<f.length;i++){let x=Math.max(-1,Math.min(1,f[i]));pcm[i]=x<0?x*0x8000:x*0x7FFF;}try{sess.sendRealtimeInput({audio:{data:bb64(new Uint8Array(pcm.buffer)),mimeType:'audio/pcm;rate=16000'}});}catch(e){}};}catch(e){setStat('microfone bloqueado');}
  return true;
}
const micBtn=$('#mic'),muteBtn=$('#mute');
let downT=0;const HOLD=450;
async function ensure(){if(!connected){return await connect();}return true;}
function startSend(){sending=true;micBtn.classList.add('on');setStat('ouvindo…','rec');muteBtn.style.display='grid';}
function stopSend(){sending=false;continuous=false;micBtn.classList.remove('on');setStat('mudo','on');}
micBtn.addEventListener('pointerdown',async e=>{e.preventDefault();downT=Date.now();const ok=await ensure();if(!ok)return;sending=true;micBtn.classList.add('on');setStat('ouvindo…','rec');muteBtn.style.display='grid';});
micBtn.addEventListener('pointerup',e=>{e.preventDefault();const held=Date.now()-downT;if(held<HOLD){if(continuous){stopSend();}else{continuous=true;sending=true;micBtn.classList.add('on');setStat('conversa contínua — toque p/ parar','rec');}}else{stopSend();}});
micBtn.addEventListener('pointercancel',()=>{if(!continuous)stopSend();});
muteBtn.addEventListener('click',()=>{stopSend();});
$('#txt').addEventListener('keydown',async e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(!v)return;e.target.value='';addUser(v);const ok=await ensure();if(!ok)return;try{sess.sendRealtimeInput({text:v});}catch(err){}}});
</script>
</body>
</html>
