<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KRONOS · Catalogo do Sistema</title><style>:root{--bg:#0b0e14;--panel:#121722;--line:#1e2632;--txt:#e6edf3;--mut:#8b98a9;--acc:#4ea1ff;--g:#3fb950;--a:#d29922;--r:#f85149}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.45 -apple-system,Segoe UI,Roboto,sans-serif}header{position:sticky;top:0;background:rgba(11,14,20,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:12px 14px;z-index:5}h1{margin:0;font-size:16px;letter-spacing:.5px}.sub{color:var(--mut);font-size:12px;margin-top:3px}.tools{display:flex;gap:8px;margin-top:10px}input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font-size:14px}button{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer}#tree{padding:8px 6px 64px}.node{margin:2px 0}.row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer}.row:hover{background:#161c28}.tw{width:14px;color:var(--mut);flex:none;text-align:center}.nm{flex:1;min-width:0}.det{color:var(--mut);font-size:12px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.badge{font-size:10px;color:var(--mut);border:1px solid var(--line);border-radius:6px;padding:1px 6px;flex:none}.pct{font-size:12px;font-variant-numeric:tabular-nums;flex:none;width:40px;text-align:right}.bar{height:4px;border-radius:3px;background:#1e2632;flex:none;width:54px;overflow:hidden}.bar i{display:block;height:100%}.kids{margin-left:14px;border-left:1px solid var(--line);padding-left:4px;display:none}.open>.kids{display:block}.cam{text-transform:uppercase;font-size:11px;letter-spacing:1px;color:var(--acc);font-weight:600}footer{position:fixed;bottom:0;left:0;right:0;background:rgba(11,14,20,.92);border-top:1px solid var(--line);padding:6px 12px;font-size:11px;color:var(--mut);text-align:center}</style></head><body><header><h1>KRONOS · Catalogo do Sistema</h1><div class="sub" id="sub">carregando...</div><div class="tools"><input id="q" placeholder="buscar item, camada, tipo..."><button id="exp">expandir</button><button id="rl">recarregar</button></div></header><div id="tree"></div><footer>lido ao vivo do banco - vw_catalogo_sistema</footer><script>var API='https://qxfyduqmuemdttrijukg.supabase.co/functions/v1/catalogo?k=kcat-9x7q&data=1';var byParent={};var allOpen=false;function pc(p){if(p==null)return'var(--mut)';if(p>=80)return'var(--g)';if(p>=40)return'var(--a)';return'var(--r)'}function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}function load(){document.getElementById('sub').textContent='carregando...';fetch(API).then(function(r){return r.json()}).then(function(d){var nodes=d||[];byParent={};for(var i=0;i<nodes.length;i++){var n=nodes[i];var p=n.parent_id||'__root__';(byParent[p]=byParent[p]||[]).push(n)}var done=0,tot=0;for(var j=0;j<nodes.length;j++){if(nodes[j].percentual!=null){tot++;if(nodes[j].percentual>=100)done++}}document.getElementById('sub').textContent=nodes.length+' nos - '+((byParent['__root__']||[]).length)+' macro - '+done+'/'+tot+' itens 100%';render()}).catch(function(e){document.getElementById('sub').textContent='erro: '+e})}function nodeEl(n){var wrap=document.createElement('div');wrap.className='node';wrap.setAttribute('data-text',((n.item||'')+' '+(n.detalhe||'')+' '+(n.tipo||'')+' '+(n.camada||'')).toLowerCase());var kids=byParent[n.id]||[];var row=document.createElement('div');row.className='row';var tw=document.createElement('span');tw.className='tw';tw.textContent=kids.length?'>':'.';var nm=document.createElement('div');nm.className='nm';var lab=n.nivel<=1?('<span class="cam">'+esc(n.item)+'</span>'):('<b>'+esc(n.item)+'</b>');nm.innerHTML=lab+'<span class="det">'+esc(n.detalhe||n.tipo||'')+'</span>';row.appendChild(tw);row.appendChild(nm);if(n.tipo&&n.nivel>1){var bd=document.createElement('span');bd.className='badge';bd.textContent=n.tipo;row.appendChild(bd)}if(n.percentual!=null){var bar=document.createElement('span');bar.className='bar';var fi=document.createElement('i');fi.style.width=n.percentual+'%';fi.style.background=pc(n.percentual);bar.appendChild(fi);var p2=document.createElement('span');p2.className='pct';p2.style.color=pc(n.percentual);p2.textContent=n.percentual+'%';row.appendChild(bar);row.appendChild(p2)}wrap.appendChild(row);if(kids.length){var box=document.createElement('div');box.className='kids';row.onclick=function(){wrap.classList.toggle('open');tw.textContent=wrap.classList.contains('open')?'v':'>'};kids.sort(function(a,b){return (''+(a.camada||'')).localeCompare(''+(b.camada||''))||(''+a.id).localeCompare(''+b.id)});for(var k=0;k<kids.length;k++)box.appendChild(nodeEl(kids[k]));wrap.appendChild(box)}else{row.style.cursor='default'}return wrap}function render(){var t=document.getElementById('tree');t.innerHTML='';var roots=byParent['__root__']||[];for(var i=0;i<roots.length;i++){var el=nodeEl(roots[i]);el.classList.add('open');var tw=el.querySelector('.tw');if(tw&&(byParent[roots[i].id]||[]).length)tw.textContent='v';t.appendChild(el)}}function walk(el,q){var own=(el.getAttribute('data-text')||'').indexOf(q)>=0;var box=el.querySelector(':scope > .kids');var any=false;if(box){var ch=box.children;for(var i=0;i<ch.length;i++){if(walk(ch[i],q))any=true}}var show=!q||own||any;el.style.display=show?'':'none';if(q&&any){el.classList.add('open');var tw=el.querySelector(':scope > .row > .tw');if(tw)tw.textContent='v'}return show}document.getElementById('rl').onclick=load;document.getElementById('exp').onclick=function(){allOpen=!allOpen;var ns=document.querySelectorAll('.node');for(var i=0;i<ns.length;i++){if(ns[i].querySelector(':scope > .kids')){if(allOpen){ns[i].classList.add('open')}else{ns[i].classList.remove('open')}var tw=ns[i].querySelector(':scope > .row > .tw');if(tw)tw.textContent=allOpen?'v':'>'}}this.textContent=allOpen?'colapsar':'expandir'};document.getElementById('q').oninput=function(){var q=(this.value||'').toLowerCase();var roots=document.querySelectorAll('#tree > .node');for(var i=0;i<roots.length;i++)walk(roots[i],q)};load();</script></body></html>
