name: Sign KRONOS APK
on: [workflow_dispatch, push]
permissions:
  contents: write
jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install build-tools
        run: sdkmanager "build-tools;34.0.0"
      - name: Generate keystore
        run: keytool -genkeypair -v -keystore kronos.jks -storepass kronos2026 -keypass kronos2026 -alias kronos -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=KRONOS,O=A3,C=BR"
      - name: Align and sign
        run: |
          BT=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          "${BT}zipalign" -f -p 4 KRONOS-unsigned.apk KRONOS-aligned.apk
          "${BT}apksigner" sign --ks kronos.jks --ks-pass pass:kronos2026 --key-pass pass:kronos2026 --out KRONOS-signed.apk KRONOS-aligned.apk
          "${BT}apksigner" verify --verbose KRONOS-signed.apk
      - name: Commit signed APK
        run: |
          git config user.name "kronos-bot"
          git config user.email "kronos-bot@users.noreply.github.com"
          git add KRONOS-signed.apk
          git commit -m "KRONOS: signed APK for sideload [skip ci]"
          git push
